<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRM - Profile</title>
    <link rel="stylesheet" href="style.css">
    <script src="profile.js" defer></script>
</head>

<body class="bg-olive-950">
    
    <section class="flex justify-center">

            <div class="flex gap-3 py-40 absolute left-0 ml-10 text-[clamp(1rem,1vw,2vw)]">
                <button id="editFileButton" class="px-3 py-1 font-mono text-zinc-300 border border-zinc-600 rounded hover:bg-zinc-800 hover:text-white transition-colors">
                        Edit File
                </button>
                <button id="deleteFileButton" class="px-3 py-1 font-mono text-red-400 border border-red-900/50 rounded hover:bg-red-900/30 hover:border-red-800 transition-colors">
                        Delete File
                </button>    
            </div>

            <svg class="w-64 h-64 text-white border-2 rounded-4xl m-10" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="0.3" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>

            <div id="editModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
                <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-lg w-96 flex flex-col gap-4">
                    <h2 class="text-white text-xl font-mono">Edit File</h2>
                    
                    <input type="text" id="editLastName" placeholder="Last Name" class="bg-zinc-800 text-white border border-zinc-600 rounded px-3 py-2 font-mono focus:outline-none focus:border-green-500">
                    <input type="text" id="editFirstName" placeholder="First Name" class="bg-zinc-800 text-white border border-zinc-600 rounded px-3 py-2 font-mono focus:outline-none focus:border-green-500">

                    <div class="flex justify-end gap-3 mt-4">
                        <button id="cancelEdit" class="px-4 py-2 font-mono text-zinc-400 hover:text-white transition-colors">Cancel</button>
                        <button id="saveEdit" class="px-4 py-2 font-mono text-green-400 border border-green-900/50 rounded hover:bg-green-900/30 hover:border-green-800 transition-colors">Save</button>
                    </div>
                </div>
            </div>

            
            <div class="flex flex-col space-y-1.5 text-lg text-white font-mono pt-16">
                <div>Surname: <span id="surName" class="text-green-500">Dumitru</span></div>
                <div>First name: <span id="firstName" class="text-green-500">Ion</span></div>
                <div>Date of birth: <span class="text-green-500">07/09/2003 <span>(Age: 22)</span></span></div>
                <div>Gender: <span class="text-green-500">Male</span></div>
                <div>Occupation: <span class="text-green-500">Muncitor IT</span></div>

                <div class="pt-2">
                    <a href="" class="pb-1 border-b-3 border-green-600 text-white font-medium hover:text-green-400 transition-colors">
                    Extra information
                    </a>
                </div>
            </div>
    </section>

    
    <section class="w-full">
    
        <div class="px-8 py-3 border-b border-green-600 bg-zinc-900 sticky top-0 z-10 flex justify-between items-center">
            <span class="text-xl font-mono text-zinc-300">Logs:</span>
            
            <div class="flex gap-3">
                <button class="px-3 py-1 text-sm font-mono text-zinc-300 border border-zinc-600 rounded hover:bg-zinc-800 hover:text-white transition-colors">
                    Edit
                </button>
                <button class="px-3 py-1 text-sm font-mono text-red-400 border border-red-900/50 rounded hover:bg-red-900/30 hover:border-red-800 transition-colors">
                    Delete
                </button>
                <button class="px-3 py-1 text-sm font-mono text-green-400 border border-green-900/50 rounded hover:bg-green-900/30 hover:border-green-800 transition-colors">
                    + Add Log
                </button>
            </div>
        </div>

        <div class="flex flex-col  w-full max-h-80 overflow-y-auto text-zinc-300">
        
            <div id="logsContainer" class="flex border-b border-green-600 hover:bg-zinc-800/50 transition-colors">
                <div id="logTimeStamp" class="w-32 shrink-0 px-4 py-3 text-green-500 border-r border-green-600 font-mono text-sm flex items-start justify-center pt-4">
                    01.12.2027
                </div>
                <div id="logContent" class="px-4 py-3 w-full text-white">
                    Lorem ipsum
                </div>
            </div>
        
        </div>
    </section>

</body>

</html>
