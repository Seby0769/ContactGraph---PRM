<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="login.js" defer></script>
  <title>PRM</title>
</head>
  
<body class="bg-olive-950 min-h-screen flex items-center justify-center">

  <form class="flex flex-col gap-4 pb-13 font-mono" id="login">

    <div class="flex flex-col gap-2">
      <label class="text-white text-[clamp(1.5rem,1.6vw,2vw)]" for="user">user</label>  
      <input class="border-1 border-white text-white rounded-lg p-0.5 text-[clamp(1.4rem,1.6vw,2vw)]" type="text" id="user">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-white text-[clamp(1.5rem,1.6vw,2vw)]" for="password">password</label>  
      <input class="border-1 border-white text-white rounded-lg p-0.5 text-[clamp(1.4rem,1.6vw,2vw)]" type="password" id="password">
    </div>

    <button type="submit" class="text-white border-1 p-2 mt-4 rounded-lg hidden">Login</button>

  </form>
</body>

</html>
