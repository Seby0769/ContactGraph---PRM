<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRM - Files</title>
    <link rel="stylesheet" href="style.css">
    <script src="filespg.js" defer></script>
</head>

<body class="bg-olive-950">
    <search>
        <form class="flex justify-center pt-20 font-mono">
                <input  id="search-form" class="border-2 border-white text-white rounded-lg p-1 text-[clamp(1.4rem,1.4vw,2vw)]" 
            type="search" placeholder="search...">
        </form>
    </search>
    
    <section class="flex justify-between">
        <div class="text-white font-mono flex w-fit h-fit mt-16 ml-10 border-2 border-white rounded-lg text-[clamp(1rem,1vw,2vw)]">
            <label class="p-1" for="filter">order by:</label>
            <select class="bg-transparent outline-none focus:outline-none focus:ring-0" id="filter">
                <option id="alphabetically" class="bg-olive-950 text-white" value="alphabetically">alphabetically</option>
                <option id="reverse-alphabetically" class="bg-olive-950 text-white" value="reverse-alphabetically">reverse-alphabetically</option>
            </select>
        </div>
        
        <div class="flex w-fit h-fit mt-14 mr-10 text-[clamp(1rem,1vw,2vw)] " >
            <button id="addFile" class="px-3 py-1 font-mono text-green-400 border border-green-900/50 rounded hover:bg-green-900/30 hover:border-green-800 transition-colors">
                + Add File
            </button>
        </div>
    </section>

    <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-lg w-96 flex flex-col gap-4">
            <h2 class="text-white text-xl font-mono">Add New File</h2>
            
            <input type="text" id="LastName" placeholder="Last Name" class="bg-zinc-800 text-white border border-zinc-600 rounded px-3 py-2 font-mono focus:outline-none focus:border-green-500">
            <input type="text" id="FirstName" placeholder="First Name" class="bg-zinc-800 text-white border border-zinc-600 rounded px-3 py-2 font-mono focus:outline-none focus:border-green-500">
            <input type="date" id="dateOfBirth" placeholder="Date of birth" class="bg-zinc-800 text-white border border-zinc-600 rounded px-3 py-2 font-mono focus:outline-none focus:border-green-500">
            <input type="text" id="gender" placeholder="Gender" class="bg-zinc-800 text-white border border-zinc-600 rounded px-3 py-2 font-mono focus:outline-none focus:border-green-500">
            <input type="text" id="occupation" placeholder="Occupation" class="bg-zinc-800 text-white border border-zinc-600 rounded px-3 py-2 font-mono focus:outline-none focus:border-green-500">
            <input type="text" id="city" placeholder="City" class="bg-zinc-800 text-white border border-zinc-600 rounded px-3 py-2 font-mono focus:outline-none focus:border-green-500">

            <div class="flex justify-end gap-3 mt-4">
                <button id="cancelAdd" class="px-4 py-2 font-mono text-zinc-400 hover:text-white transition-colors">Cancel</button>
                <button id="saveNewFile" class="px-4 py-2 font-mono text-green-400 border border-green-900/50 rounded hover:bg-green-900/30 hover:border-green-800 transition-colors">Save</button>
            </div>
        </div>
    </div>


    <section id="profile-cards" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-6 pt-10 w-full max-w-screen-2xl mx-auto">
    </section>

</body>

</html>
